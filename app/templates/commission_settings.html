{% extends "base.html" %}
{% block title %}Commission Settings{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="h4 mb-0">Commission Settings</h2>
  </div>

  <form method="POST" class="card p-3">
    <div class="row mb-3">
      <div class="col-md-4">
        <label class="form-label">Max Levels</label>
        <input type="number" name="max_levels" class="form-control" value="{{ settings.max_levels }}" min="1" />
      </div>
    </div>

    <div class="row g-3">
      {% for rule in rules %}
        <div class="col-md-3">
          <label class="form-label">Level {{ rule.level }} (%)</label>
          <input
            type="number"
            step="0.01"
            min="0"
            name="level_{{ rule.level }}_percentage"
            class="form-control"
            value="{{ rule.percentage }}"
          />
        </div>
      {% endfor %}
    </div>

    <div class="mt-4">
      <button type="submit" class="btn btn-primary">Save Settings</button>
    </div>
  </form>
{% endblock %}
